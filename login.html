<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar - Poar Estética</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <div class="app-shell">
        <header class="top-header">
            <a href="index.html" class="header-brand">
                <div class="header-logo">P</div>
                <div>
                    <h1 class="header-title">Poar</h1>
                    <p class="header-subtitle">Estética</p>
                </div>
            </a>
            <nav class="desktop-nav">
                <a href="index.html" class="nav-link"><i class="fas fa-home"></i> Início</a>
                <a href="agendar.html" class="nav-link"><i class="far fa-calendar-plus"></i> Agendar</a>
                <a href="catalogo.html" class="nav-link"><i class="fas fa-th-large"></i> Catálogo</a>
            </nav>
            <div class="header-actions">
                <a href="login.html" class="header-link"><i class="far fa-user"></i><span>Entrar</span></a>
            </div>
        </header>

        <main class="main-content">
            <!-- Se NÃO logado: formulário de login -->
            <div class="login-page" id="login-page">
                <div class="login-card">
                    <div class="login-logo"><i class="fas fa-spa"></i></div>
                    <h2 class="login-title">Bem-vinda de volta</h2>
                    <p class="login-subtitle">Entre com seu e-mail para continuar</p>

                    <form id="login-form" onsubmit="handleLogin(event)" style="text-align: left;">
                        <div class="form-group">
                            <label class="form-label" for="login-name">Nome</label>
                            <input type="text" class="form-control" id="login-name" placeholder="Seu nome" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="login-email">E-mail</label>
                            <input type="email" class="form-control" id="login-email" placeholder="seu@email.com" required autocomplete="email">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="login-password">Senha</label>
                            <input type="password" class="form-control" id="login-password" placeholder="Sua senha" required autocomplete="current-password" minlength="4">
                        </div>

                        <div class="flex justify-between items-center mb-16">
                            <label style="display: flex; align-items: center; gap: 6px; font-size: 0.75rem; color: var(--text-muted); cursor: pointer;">
                                <input type="checkbox" id="remember-me"> Lembrar de mim
                            </label>
                            <a href="#" class="text-sm" style="color: var(--accent); font-weight: 600;" onclick="showToast('Em breve!'); return false;">Esqueci a senha</a>
                        </div>

                        <button type="submit" class="btn btn-primary btn-full btn-lg" id="btn-login">
                            Entrar
                        </button>
                    </form>

                    <div class="login-divider">ou</div>

                    <button class="btn btn-outline btn-full" onclick="handleRegister()">
                        <i class="fas fa-user-plus"></i> Criar conta
                    </button>

                    <p class="text-xs text-muted mt-16 text-center">
                        <i class="fas fa-info-circle"></i> E-mails com <strong>@poar.com</strong> são reconhecidos automaticamente como gestão.
                    </p>
                </div>
            </div>

            <!-- Se LOGADO: perfil simples -->
            <div class="login-page hidden" id="profile-page">
                <div class="login-card">
                    <div class="login-logo"><i class="fas fa-user-check"></i></div>
                    <h2 class="login-title" id="profile-name"></h2>
                    <p class="login-subtitle" id="profile-email"></p>

                    <div class="card mb-16" style="text-align: left;" id="profile-bookings"></div>

                    <div id="profile-gestao-link" class="hidden mb-16">
                        <a href="gestao.html" class="btn btn-dark btn-full btn-lg">
                            <i class="fas fa-cog"></i> Painel de Gestão
                        </a>
                    </div>

                    <button class="btn btn-outline btn-full" onclick="handleLogout()">
                        <i class="fas fa-sign-out-alt"></i> Sair da conta
                    </button>
                </div>
            </div>
        </main>

        <nav class="bottom-nav">
            <a href="index.html" class="nav-btn"><i class="fas fa-home"></i><span>Início</span></a>
            <a href="agendar.html" class="nav-btn"><i class="far fa-calendar-plus"></i><span>Agendar</span></a>
            <a href="catalogo.html" class="nav-btn"><i class="fas fa-th-large"></i><span>Catálogo</span></a>
            <a href="login.html" class="nav-btn active"><i class="far fa-user"></i><span>Entrar</span></a>
        </nav>
    </div>

    <div class="toast" id="toast"></div>

    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const user = getCurrentUser();
            if (user) {
                showProfile(user);
            }
        });

        function showProfile(user) {
            document.getElementById('login-page').classList.add('hidden');
            document.getElementById('profile-page').classList.remove('hidden');

            document.getElementById('profile-name').textContent = user.name || user.email.split('@')[0];
            document.getElementById('profile-email').textContent = user.email;

            // Mostrar link gestão se admin
            if (user.role === 'gestao') {
                document.getElementById('profile-gestao-link').classList.remove('hidden');
            }

            // Agendamentos ativos
            const today = new Date().toISOString().split('T')[0];
            const bookings = getBookings().filter(b => b.date >= today && b.clientEmail === user.email);

            const container = document.getElementById('profile-bookings');
            if (bookings.length === 0) {
                container.innerHTML = `
                    <p class="text-sm text-muted text-center" style="padding: 12px 0;">
                        <i class="far fa-calendar"></i> Nenhum agendamento ativo
                    </p>`;
            } else {
                container.innerHTML = `
                    <p class="text-xs fw-600 text-muted mb-12" style="text-transform: uppercase;">Seus agendamentos</p>
                    ${bookings.sort((a,b) => (a.date+a.time).localeCompare(b.date+b.time)).map(b => {
                        const dateObj = new Date(b.date + 'T12:00:00');
                        const dateLabel = dateObj.toLocaleDateString('pt-BR', { day: '2-digit', month: 'short' });
                        return `
                            <div class="flex items-center gap-12" style="padding: 8px 0; border-bottom: 1px solid var(--border-light);">
                                <div style="min-width: 50px;">
                                    <p class="text-sm fw-700" style="color: var(--accent);">${b.time}</p>
                                    <p class="text-xs text-muted">${dateLabel}</p>
                                </div>
                                <div style="flex:1;">
                                    <p class="text-sm fw-600">${b.serviceName}</p>
                                    <p class="text-xs text-muted">${b.duration}min</p>
                                </div>
                                <p class="text-sm fw-700" style="color: var(--accent);">R$ ${fmtPrice(b.serviceName ? getServices().find(s=>s.id===b.serviceId)?.price || 0 : 0)}</p>
                            </div>`;
                    }).join('')}
                `;
            }
        }

        function handleLogin(e) {
            e.preventDefault();
            const name = document.getElementById('login-name').value.trim();
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;

            if (!name || !email || !password) {
                showToast('Preencha todos os campos', 'error');
                return;
            }

            const users = getUsers();
            const existing = users.find(u => u.email === email);

            if (existing) {
                // Login
                if (existing.password !== password) {
                    showToast('Senha incorreta', 'error');
                    document.getElementById('login-password').classList.add('is-invalid');
                    setTimeout(() => document.getElementById('login-password').classList.remove('is-invalid'), 2000);
                    return;
                }
                existing.name = name; // atualiza nome se mudou
                localStorage.setItem('poar_users', JSON.stringify(users));
                localStorage.setItem('poar_current_user', JSON.stringify(existing));
                showToast(`Bem-vinda, ${existing.name}!`, 'success');
                setTimeout(() => {
                    if (existing.role === 'gestao') {
                        window.location.href = 'gestao.html';
                    } else {
                        showProfile(existing);
                    }
                }, 600);
            } else {
                // Registro automático
                handleRegisterWithData(name, email, password);
            }
        }

        function handleRegister() {
            const name = document.getElementById('login-name').value.trim();
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;

            if (!name || !email || !password) {
                showToast('Preencha nome, e-mail e senha para criar conta', 'error');
                return;
            }
            if (password.length < 4) {
                showToast('Senha deve ter pelo menos 4 caracteres', 'error');
                return;
            }
            handleRegisterWithData(name, email, password);
        }

        function handleRegisterWithData(name, email, password) {
            const users = getUsers();
            if (users.find(u => u.email === email)) {
                showToast('Este e-mail já está cadastrado. Faça login.', 'error');
                return;
            }

            // E-mail @poar.com = gestão automaticamente
            const role = isAdmin(email) ? 'gestao' : 'cliente';

            const newUser = {
                id: Date.now().toString(),
                email,
                password,
                role,
                name
            };

            users.push(newUser);
            localStorage.setItem('poar_users', JSON.stringify(users));
            localStorage.setItem('poar_current_user', JSON.stringify(newUser));

            showToast('Conta criada com sucesso!', 'success');
            setTimeout(() => {
                if (role === 'gestao') {
                    window.location.href = 'gestao.html';
                } else {
                    showProfile(newUser);
                }
            }, 600);
        }

        function handleLogout() {
            localStorage.removeItem('poar_current_user');
            showToast('Saiu da conta', 'success');
            setTimeout(() => window.location.reload(), 500);
        }
    </script>
</body>
</html>
