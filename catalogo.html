<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo - Poar Estética</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <div class="app-shell">
        <header class="top-header">
            <a href="index.html" class="header-brand">
                <div class="header-logo">P</div>
                <div>
                    <h1 class="header-title">Poar</h1>
                    <p class="header-subtitle">Estética</p>
                </div>
            </a>
            <nav class="desktop-nav">
                <a href="index.html" class="nav-link"><i class="fas fa-home"></i> Início</a>
                <a href="agendar.html" class="nav-link"><i class="far fa-calendar-plus"></i> Agendar</a>
                <a href="catalogo.html" class="nav-link active"><i class="fas fa-th-large"></i> Catálogo</a>
            </nav>
            <div class="header-actions">
                <a href="login.html" class="header-link" id="header-user-btn"><i class="far fa-user"></i><span id="header-user-name">Entrar</span></a>
            </div>
        </header>

        <main class="main-content">
            <!-- Barra de busca -->
            <div class="section" style="padding-top: 16px; padding-bottom: 0;">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" class="form-control" id="search-input" placeholder="Buscar serviços e produtos..." oninput="handleSearch()">
                </div>
            </div>

            <!-- Filtros -->
            <div class="filter-row" id="catalog-filters">
                <button class="chip active" onclick="filterCatalog('todos', this)">Todos</button>
                <button class="chip" onclick="filterCatalog('servicos', this)"><i class="fas fa-spa"></i> Serviços</button>
                <button class="chip" onclick="filterCatalog('produtos', this)"><i class="fas fa-pump-soap"></i> Produtos</button>
            </div>

            <!-- Grid -->
            <div class="catalog-grid" id="catalog-grid"></div>

            <div class="empty-state hidden" id="catalog-empty">
                <i class="fas fa-search"></i>
                <p>Nenhum resultado encontrado.</p>
                <button class="btn btn-ghost mt-12" onclick="clearSearch()">Limpar busca</button>
            </div>

            <div style="height: 32px;"></div>
        </main>

        <!-- Bottom Sheet Detalhes -->
        <div class="modal-overlay" id="detail-overlay" onclick="closeDetail()"></div>
        <div class="bottom-sheet" id="detail-sheet">
            <div class="bottom-sheet-handle"></div>
            <div id="detail-content"></div>
        </div>

        <nav class="bottom-nav">
            <a href="index.html" class="nav-btn"><i class="fas fa-home"></i><span>Início</span></a>
            <a href="agendar.html" class="nav-btn"><i class="far fa-calendar-plus"></i><span>Agendar</span></a>
            <a href="catalogo.html" class="nav-btn active"><i class="fas fa-th-large"></i><span>Catálogo</span></a>
            <a href="login.html" class="nav-btn"><i class="far fa-user"></i><span>Entrar</span></a>
        </nav>
    </div>

    <div class="toast" id="toast"></div>

    <script src="app.js"></script>
    <script>
        let currentFilter = 'todos';
        let searchQuery = '';

        document.addEventListener('DOMContentLoaded', () => {
            renderCatalog();
            updateHeaderUser();
            if (window.location.hash === '#produtos') {
                filterCatalog('produtos', document.querySelectorAll('#catalog-filters .chip')[2]);
            }
        });

        function updateHeaderUser() {
            const user = getCurrentUser();
            if (user) {
                document.getElementById('header-user-name').textContent = user.name || user.email.split('@')[0];
                document.getElementById('header-user-btn').href = user.role === 'gestao' ? 'gestao.html' : 'login.html';
            }
        }

        function filterCatalog(filter, btn) {
            currentFilter = filter;
            document.querySelectorAll('#catalog-filters .chip').forEach(c => c.classList.remove('active'));
            if (btn) btn.classList.add('active');
            renderCatalog();
        }

        function handleSearch() {
            searchQuery = document.getElementById('search-input').value.trim().toLowerCase();
            renderCatalog();
        }

        function clearSearch() {
            document.getElementById('search-input').value = '';
            searchQuery = '';
            renderCatalog();
        }

        function renderCatalog() {
            const services = getServices();
            const products = getProducts();
            const grid = document.getElementById('catalog-grid');
            const empty = document.getElementById('catalog-empty');

            let items = [];
            if (currentFilter === 'todos' || currentFilter === 'servicos') {
                services.forEach(s => items.push({ ...s, type: 'servico' }));
            }
            if (currentFilter === 'todos' || currentFilter === 'produtos') {
                products.forEach(p => items.push({ ...p, type: 'produto' }));
            }

            // Filtro de busca
            if (searchQuery) {
                items = items.filter(i =>
                    i.name.toLowerCase().includes(searchQuery) ||
                    (i.description || '').toLowerCase().includes(searchQuery)
                );
            }

            if (items.length === 0) {
                grid.innerHTML = '';
                empty.classList.remove('hidden');
                return;
            }

            empty.classList.add('hidden');
            grid.innerHTML = items.map(item => {
                const img = item.image || placeholderImg(item.type);
                const isService = item.type === 'servico';
                return `
                    <div class="catalog-card" onclick="showDetail('${item.id}', '${item.type}')">
                        <img src="${img}" alt="${item.name}" class="catalog-card-img" loading="lazy">
                        <div class="catalog-card-body">
                            <p class="catalog-card-name">${item.name}</p>
                            <p class="catalog-card-desc">${item.description || (isService ? 'Serviço profissional' : 'Produto de qualidade')}</p>
                            <div class="catalog-card-footer">
                                <span class="catalog-card-price">R$ ${fmtPrice(item.price)}</span>
                                ${isService ? `<span class="catalog-card-time"><i class="far fa-clock"></i> ${item.duration}min</span>` : ''}
                            </div>
                        </div>
                    </div>`;
            }).join('');
        }

        function showDetail(id, type) {
            const items = type === 'servico' ? getServices() : getProducts();
            const item = items.find(i => i.id === id);
            if (!item) return;

            const isService = type === 'servico';
            const img = item.image || placeholderImg(type);

            document.getElementById('detail-content').innerHTML = `
                <img src="${img}" alt="${item.name}" style="width:100%; height:200px; object-fit:cover; border-radius: var(--r-md); margin-bottom: 16px;">
                <h3 style="font-size: 1.15rem; font-weight: 700; color: var(--text-dark);">${item.name}</h3>
                <p class="text-sm text-muted mt-8">${item.description || (isService ? 'Tratamento profissional realizado com produtos de alta qualidade.' : 'Produto selecionado para os melhores resultados.')}</p>
                <div class="flex justify-between items-center mt-16">
                    <span style="font-size: 1.3rem; font-weight: 800; color: var(--accent);">R$ ${fmtPrice(item.price)}</span>
                    ${isService ? `<span class="text-sm text-muted"><i class="far fa-clock"></i> ${item.duration} min</span>` : ''}
                </div>
                ${isService ? `<a href="agendar.html" class="btn btn-primary btn-full mt-16 btn-lg"><i class="far fa-calendar-plus"></i> Agendar este serviço</a>` : ''}
                <button class="btn btn-ghost btn-full mt-8" onclick="closeDetail()" style="color:var(--text-muted);">Fechar</button>
            `;

            openModal('detail-overlay', 'detail-sheet');
        }

        function closeDetail() {
            closeModal('detail-overlay', 'detail-sheet');
        }
    </script>
</body>
</html>
